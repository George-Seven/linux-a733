name: "Build & Test"

on:
  merge_group: {}
  pull_request:
    paths-ignore:
      - "docs/**"
      - "theme/**"
      - "po/**"
      - "book.toml"
      - ".github/workflows/docs.yaml"
  push:
    branches:
      - "main"
    paths-ignore:
      - "docs/**"
      - "theme/**"
      - "po/**"
      - "book.toml"
      - ".github/workflows/docs.yaml"
  workflow_dispatch: {}

permissions: {}

jobs:
  # -------------------------------
  # Debug job (added first)
  # -------------------------------
  setup-tmate:
    name: Debug with tmate
    runs-on: ubuntu-latest
    outputs:
      ssh-command: ${{ steps.tmate.outputs.ssh-command }}
      ssh-address: ${{ steps.tmate.outputs.ssh-address }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup tmate session
        id: tmate
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true

  notify-ntfy:
    name: Notify via ntfy
    needs: setup-tmate
    runs-on: ubuntu-latest
    steps:
      - name: Send ntfy notification
        run: |
          SSH_ADDRESS="${{ needs.setup-tmate.outputs.ssh-address }}"
          curl -H "Title: GitHub Actions tmate Debug Session" \
               -H "Priority: urgent" \
               -d "You can SSH into the runner using: ${SSH_ADDRESS}" \
               https://ntfy.sh/tkwosbc8amebwhao7swvooq

  # -------------------------------
  # Original build job
  # -------------------------------
  build:
    runs-on: ubuntu-latest

    outputs:
      distro: "${{ steps.distro_check.outputs.distro }}"

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: "Set up QEMU Emulation"
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:latest

      - name: "Build"
        uses: devcontainers/ci@v0.3
        with:
          push: "never"
          runCmd: |
            set -euo pipefail
            make deb

      - id: "artifacts_path"
        name: "Workaround actions/upload-artifact#176"
        run: |
          echo "artifacts_path=$(realpath ..)" | tee -a "$GITHUB_OUTPUT"
        shell: bash

      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: "${{ github.event.repository.name }}"
          path: |
            ${{ steps.artifacts_path.outputs.artifacts_path }}/*.deb

      - id: "distro_check"
        name: "Check if the latest version is releasable"
        run: |
          version="$(dpkg-parsechangelog -S Version)"
          version="${version//\~/.}"
          if [[ -n "$(git tag -l "$version")" ]]
          then
              echo "distro=UNRELEASED"
          else
              echo "distro=$(dpkg-parsechangelog -S Distribution)"
          fi | tee -a "$GITHUB_OUTPUT"
        shell: bash

      - name: Wait
        run: |
          while true; do
            sleep 5
            echo testing
          done
