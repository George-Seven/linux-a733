name: "Build & Test"

on:
  merge_group: {}
  pull_request:
    paths-ignore:
      - "docs/**"
      - "theme/**"
      - "po/**"
      - "book.toml"
      - ".github/workflows/docs.yaml"
  push:
    branches:
      - "main"
    paths-ignore:
      - "docs/**"
      - "theme/**"
      - "po/**"
      - "book.toml"
      - ".github/workflows/docs.yaml"
  workflow_dispatch: {}

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      distro: "${{ steps.distro_check.outputs.distro }}"

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: "Set up QEMU Emulation"
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:latest

      - name: "Build"
        uses: devcontainers/ci@v0.3
        with:
          push: "never"
          runCmd: |
            set -euo pipefail
            make deb

      - id: "artifacts_path"
        name: "Workaround actions/upload-artifact#176"
        run: |
          echo "artifacts_path=$(realpath ..)" | tee -a "$GITHUB_OUTPUT"
        shell: bash

      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: "${{ github.event.repository.name }}"
          path: |
            ${{ steps.artifacts_path.outputs.artifacts_path }}/*.deb

      - id: "distro_check"
        name: "Check if the latest version is releasable"
        run: |
          version="$(dpkg-parsechangelog -S Version)"
          version="${version//\~/.}"
          if [[ -n "$(git tag -l "$version")" ]]
          then
              echo "distro=UNRELEASED"
          else
              echo "distro=$(dpkg-parsechangelog -S Distribution)"
          fi | tee -a "$GITHUB_OUTPUT"
        shell: bash

      # Added debug step (same job, after build completes)
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
